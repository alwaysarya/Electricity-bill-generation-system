<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Record Payment</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>Record Payment</h1>
</header>

<form method="post">

  <label>Bill
    <select name="bill_id" required>
      <option disabled selected>Select Bill</option>
      {% for bill in bills %}
        <option value="{{ bill.bill_id }}">
          Bill #{{ bill.bill_id }} - {{ bill.name }} - ₹{{ bill.amount_due }} ({{ bill.status }})
        </option>
      {% endfor %}
    </select>
  </label>

  <label>Payment Date
    <input type="date" name="payment_date" required>
  </label>

  <label>Amount Paid
    <input type="number" step="0.01" name="amount_paid" required>
  </label>

  <label>Method
    <select name="method">
      <option>Cash</option>
      <option>Card</option>
      <option>UPI</option>
    </select>
  </label>

  <button type="submit">Submit Payment</button>
</form>

<a href="/">Back</a>

</body>
</html>

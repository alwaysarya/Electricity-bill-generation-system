<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Add Reading</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header><h1>Add Meter Reading</h1></header>
    <form method="post">
      <label>Customer<select name="customer_id">
        {% for customer in customers %}
          <option value="{{ customer.customer_id }}">{{ customer.name }}</option>
        {% endfor %}
      </select></label>
      <label>Reading Date<input type="date" name="reading_date" required></label>
      <label>Units Consumed<input type="number" name="units_consumed" min="0" required></label>
      <button type="submit">Save Reading</button>
    </form>
    <a href="/">Back</a>
  </body>
</html>
